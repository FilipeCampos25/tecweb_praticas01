<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formação de Grupos - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Formação de Grupos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="listagem.html">Listagem</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Cadastro</h2>
        <form id="cadastro-form" novalidate>
            <div class="form-group">
                <label for="nome">Nome do grupo</label>
                <input type="text" id="nome" name="nome">
                <span class="error" id="error-nome"></span>
            </div>
            <div class="form-group">
                <label for="integrantes">Quantidade de integrantes</label>
                <input type="number" id="integrantes" name="integrantes" min="1">
                <span class="error" id="error-integrantes"></span>
            </div>
            <div class="form-group">
                <label for="lider">Nome do líder</label>
                <input type="text" id="lider" name="lider">
                <span class="error" id="error-lider"></span>
            </div>
            <button type="submit">Salvar</button>
        </form>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
